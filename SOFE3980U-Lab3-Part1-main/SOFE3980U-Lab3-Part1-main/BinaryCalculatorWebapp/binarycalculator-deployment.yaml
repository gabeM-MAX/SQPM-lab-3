apiVersion: apps/v1
kind: Deployment
metadata:
  name: binarycalculator-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: binarycalculator
  template:
    metadata:
      labels:
        app: binarycalculator
    spec:
      containers:
        - image: us-central1-docker.pkg.dev/sqpm-lab-3-490104/sofe3980u/binarycalculator
          name: binarycalculator
          ports:
            - containerPort: 8080
